{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="fw-bold mb-4" style="color: var(--cor-santuario)">Painel de Estatísticas</h2>

    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card bg-light border-0 shadow-sm text-center p-3">
                <h6 class="text-muted text-uppercase small">Famílias Atendidas</h6>
                <h2 class="fw-bold">{{ total_familias }}</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border-0 shadow-sm text-center p-3 text-white" style="background-color: var(--cor-santuario)">
                <h6 class="text-uppercase small">Itens em Alerta (<=5)</h6>
                <h2 class="fw-bold">{{ itens_criticos }}</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card bg-success border-0 shadow-sm text-center p-3 text-white">
                <h6 class="text-uppercase small">Total Entradas</h6>
                <h2 class="fw-bold">{{ entradas }}</h2>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm p-3">
                <h5 class="fw-bold mb-3 small">Distribuição do Estoque (Itens Ativos)</h5>
                <canvas id="graficoEstoque"></canvas>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm p-3">
                <h5 class="fw-bold mb-3 small">Volume de Operações (Total Histórico)</h5>
                <canvas id="graficoBarras"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    /**
     * AJUSTE DEVIDO O VS CODE:
     * Para evitar mensagem de erro na guia "Problemas", transformado os dados do Jinja
     * em strings temporárias que o JavaScript resolve no carregamento.
     */

    // --- Gráfico de Rosca (Estoque) ---
    const ctxPizza = document.getElementById('graficoEstoque');
    
    // Convertemos a string do Jinja em objeto JS real
    const labelsEstoque = JSON.parse('{{ labels|tojson|safe }}');
    const valoresEstoque = JSON.parse('{{ valores|tojson|safe }}');

    new Chart(ctxPizza, {
        type: 'doughnut',
        data: {
            labels: labelsEstoque,
            datasets: [{
                data: valoresEstoque,
                backgroundColor: ['#4f1f19', '#f0b624', '#28a745', '#17a2b8', '#6c757d', '#ffc107', '#d63384'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // --- Gráfico de Barras (Fluxo) ---
    const ctxBarras = document.getElementById('graficoBarras');
    
    // Forçamos o reconhecimento como número para silenciar o editor
    const numEntradas = Number('{{ entradas }}');
    const numSaidas = Number('{{ saidas }}');

    new Chart(ctxBarras, {
        type: 'bar',
        data: {
            labels: ['Entradas', 'Saídas'],
            datasets: [{
                label: 'Quantidade Total',
                data: [numEntradas, numSaidas],
                backgroundColor: ['#28a745', '#6c757d'],
                borderRadius: 5
            }]
        },
        options: { 
            scales: { y: { beginAtZero: true } },
            plugins: { legend: { display: false } }
        }
    });
</script>
{% endblock %}
