{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Cadastro de beneficiários</h5>
            </div>
            <div class="card-body">
                <form action="/beneficiarios" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome do Responsável</label>
                        <input type="text" name="nome" class="form-control" placeholder="Ex: Maria Silva" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" name="telefone" class="form-control" placeholder="(11) 99999-9999">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Endereço</label>
                        <textarea name="endereco" class="form-control" rows="2" placeholder="Rua, Número, Bairro"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Salvar Cadastro</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Famílias Cadastradas</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive"> <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Telefone</th>
                                <th>Endereço</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for b in beneficiarios %}
                            <tr>
                                <td>**{{ b.nome }}**</td>
                                <td>{{ b.telefone }}</td>
                                <td><small>{{ b.endereco }}</small></td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="3" class="text-center text-muted">Nenhuma família cadastrada ainda.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="mt-3">
    <a href="/" class="btn btn-outline-secondary">← Voltar para o Estoque</a>
</div>
{% endblock %}
